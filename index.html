<head>

    <title>Tu Sitio de Detailing</title>
    
    <style>
        /* --- ESTILOS DEL BOTÓN WHATSAPP --- */
        .btn-whatsapp {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25d366;
            color: #ffffff;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            z-index: 10;
            cursor: pointer;
            transition: transform 0.3s ease;
            font-family: Arial, sans-serif; /* Fuente limpia para el texto */
        }

        /* Efecto al pasar el mouse por encima */
        .btn-whatsapp:hover {
            transform: scale(1.05);
        }
    </style>
</head>
